name: "LOTA CodeQL config"

# include/vmlinux.h is a generated bpftool BTF dump of kernel type
# definitions. Its enum initializer style and bit-field signedness are
# artifacts of the dump format, not project source, and the file is
# regenerated wholesale, so CodeQL findings inside it are not actionable
paths-ignore:
  - include/vmlinux.h

# cpp/poorly-documented-function is a comment-density heuristic (>= 2% of a
# function's lines must be comments). LOTA code is written to be
# self-documenting in the kernel style, so this metric is treated as
# non-actionable noise for this project
query-filters:
  - exclude:
      id: cpp/poorly-documented-function
