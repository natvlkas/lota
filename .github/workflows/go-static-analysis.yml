name: Go static analysis

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# cancel superseded runs of this workflow on the same ref to bound
# concurrent job usage; let pushes to main run to completion
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/verifier
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/verifier/go.mod
          cache-dependency-path: src/verifier/go.sum

      - name: Verify go.mod is tidy
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          for mod in src/verifier src/attestca src/sdk/server; do
            (cd "$mod" && go mod tidy)
          done
          if ! git diff --exit-code -- '**/go.mod' '**/go.sum'; then
            echo "go.mod/go.sum out of sync with sources -- run 'go mod tidy' locally" >&2
            exit 1
          fi

      - name: Run Go tests
        run: go test ./...

      - name: Run attestca tests
        working-directory: src/attestca
        run: go test ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: v1.64.8
          working-directory: src/verifier
          args: --config ../../.golangci.yml ./...

      - name: Run golangci-lint (attestca)
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: v1.64.8
          working-directory: src/attestca
          args: --config ../../.golangci.yml ./...

  go-coverage:
    name: go-coverage-ratchet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/verifier/go.mod
          cache-dependency-path: src/verifier/go.sum

      - name: Coverage ratchet
        # Fails if any Go package drops below its recorded floor in
        # .github/go-coverage-baseline. Raise the floors as tests land;
        # the target is 100%.
        run: ./scripts/check-go-coverage.sh

  go-licenses:
    name: go-licenses
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/verifier/go.mod
          cache-dependency-path: |
            src/verifier/go.sum
            src/attestca/go.sum
            src/sdk/server/go.sum
            examples/demo_server/go.sum

      - name: Install go-licenses
        env:
          GOTOOLCHAIN: auto
        run: go install github.com/google/go-licenses@v1.6.0

      - name: Check dependency licenses against the permissive allowlist
        # Fail if any dependency carries a license outside the permissive
        # allowlist. A copyleft license (GPL/AGPL/...) pulled in transitively
        # would force opening proprietary integrations, so the build blocks
        # before it lands. The project's own packages are ignored, and
        # modernc.org/mathutil is ignored because go-licenses cannot classify
        # its license file even though it is BSD-3-Clause (permissive).
        run: |
          set -eu
          go_licenses="$(go env GOPATH)/bin/go-licenses"
          allow="MIT,BSD-3-Clause,BSD-2-Clause,Apache-2.0,ISC,MPL-2.0"
          rc=0
          for mod in src/verifier src/attestca src/sdk/server examples/demo_server; do
            echo "::group::go-licenses $mod"
            (cd "$mod" && "$go_licenses" check ./... \
              --allowed_licenses="$allow" \
              --ignore github.com/szymonwilczek/lota \
              --ignore modernc.org/mathutil) || rc=1
            echo "::endgroup::"
          done
          exit "$rc"

  go-fuzz-discover:
    name: go-fuzz (discover)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: List fuzz targets
        id: list
        run: |
          set -eu
          items=()
          for mod in src/verifier src/sdk/server src/attestca; do
            while IFS= read -r file; do
              pkg="./$(dirname "$file")"
              while IFS= read -r fn; do
                items+=("$(jq -nc \
                  --arg m "$mod" --arg p "$pkg" --arg f "$fn" \
                  '{module:$m,pkg:$p,fn:$f}')")
              done < <(grep -oE '^func Fuzz[A-Za-z0-9_]+' "$mod/$file" \
                       | awk '{print $2}')
            done < <(cd "$mod" \
                     && grep -rlE '^func Fuzz' --include='*_test.go' . \
                     | sed 's#^\./##')
          done
          matrix="$(printf '%s\n' "${items[@]}" | jq -sc .)"
          echo "discovered $(printf '%s\n' "${items[@]}" | wc -l) targets"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  go-fuzz:
    name: go-fuzz
    needs: go-fuzz-discover
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      # one runner per target; a crash in one must not cancel the others
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.go-fuzz-discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.target.module }}/go.mod
          cache-dependency-path: ${{ matrix.target.module }}/go.sum

      - name: Fuzz ${{ matrix.target.fn }}
        # Runs one fuzz target for a bounded time against random input on top
        # of its seed corpus. The targets cover the code that parses untrusted
        # bytes -- attestation tokens, TPM quote/attest blobs, event logs,
        # certificates, signed policies and the enrollment wire/AIK areas -- so
        # a panic or unhandled input is shaken out before it reaches a live
        # verifier or CA. A crash leaves a reproducer under testdata/fuzz and
        # fails this target.
        # syzkaller fuzzes the BPF/kernel surface out of band;
        # this is the in-tree parser coverage on every pull request.
        # Matrix values are passed through env, not the shell, to keep them
        # out of the command line.
        env:
          FUZZTIME: 60s
          T_MODULE: ${{ matrix.target.module }}
          T_PKG: ${{ matrix.target.pkg }}
          T_FN: ${{ matrix.target.fn }}
        run: |
          set -eu
          cd "$T_MODULE"
          go test -run='^$' -fuzz="^${T_FN}\$" -fuzztime="$FUZZTIME" "$T_PKG"
