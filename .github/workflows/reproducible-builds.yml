name: Reproducible build audit

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# cancel superseded runs of this workflow on the same ref to bound
# concurrent job usage; let pushes to main run to completion
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  reproducible:
    name: reproducible-build audit
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang llvm pkg-config \
            libelf-dev zlib1g-dev \
            libtss2-dev \
            libssl-dev libsystemd-dev libseccomp-dev \
            libdbus-1-dev \
            diffoscope

      - name: Install libbpf >= 1.0
        env:
          LIBBPF_VERSION: v1.4.6
        run: |
          set -eu
          git clone --depth 1 --branch "$LIBBPF_VERSION" \
            https://github.com/libbpf/libbpf.git /tmp/libbpf
          make -C /tmp/libbpf/src -j"$(nproc)"
          sudo make -C /tmp/libbpf/src install \
            PREFIX=/usr LIBDIR=/usr/lib/x86_64-linux-gnu
          sudo ldconfig

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/verifier/go.mod
          cache-dependency-path: src/verifier/go.sum

      - name: Build the tree twice under different environments
        # Security agent must let a dev confirm the shipped binary matches
        # what public CI built. Two builds from separate source paths, time
        # zones and wall clocks (with a pinned SOURCE_DATE_EPOCH) should be
        # bit-for-bit identical; anything that leaks the build path or
        # timestamp into a binary shows up as a difference
        run: |
          set -eu
          export SOURCE_DATE_EPOCH=1700000000
          cp -a "$GITHUB_WORKSPACE" /tmp/build-a
          cp -a "$GITHUB_WORKSPACE" /tmp/build-b
          (cd /tmp/build-a && TZ=UTC make BUILD_DIR=out all)
          (cd /tmp/build-b && TZ=Asia/Tokyo make BUILD_DIR=out all)

      - name: Compare artifacts (audit, non-blocking)
        # Audit mode: report differences but do not fail the build, so the
        # path to reproducibility can be closed incrementally
        # (-trimpath for Go, -ffile-prefix-map for C, honoring SOURCE_DATE_EPOCH)
        run: |
          set -u
          mkdir -p repro-report
          artifacts="lota-agent lota-verifier lota-attest-ca lota-pcr14-lock \
            liblotagaming.so liblotaserver.so liblota_wine_hook.so \
            liblota_anticheat.so lota_lsm.bpf.o"
          differ=0
          for a in $artifacts; do
            fa="/tmp/build-a/out/$a"
            fb="/tmp/build-b/out/$a"
            if [ ! -e "$fa" ] || [ ! -e "$fb" ]; then
              echo "skip $a (not built)"
              continue
            fi
            if cmp -s "$fa" "$fb"; then
              echo "reproducible: $a"
            else
              echo "DIFFERS: $a"
              differ=1
              diffoscope --text "repro-report/$a.txt" "$fa" "$fb" || true
            fi
          done
          if [ "$differ" -ne 0 ]; then
            echo "::warning::build is not yet bit-for-bit reproducible; see the reproducibility-report artifact"
          else
            echo "build is bit-for-bit reproducible"
          fi

      - name: Upload reproducibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reproducibility-report
          path: repro-report
          if-no-files-found: ignore
