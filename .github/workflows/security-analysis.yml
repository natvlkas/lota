name: Security analysis

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# cancel superseded runs of this workflow on the same ref to bound
# concurrent job usage; let pushes to main run to completion
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  codeql:
    name: codeql-${{ matrix.language }}
    runs-on: ubuntu-24.04
    permissions:
      actions: read # read workflow run metadata for the CodeQL action
      contents: read # check out the source to analyze
      security-events: write # upload CodeQL SARIF results to code scanning
    strategy:
      fail-fast: false
      matrix:
        language: [c-cpp, go]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install C build dependencies
        if: matrix.language == 'c-cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang llvm pkg-config \
            libelf-dev zlib1g-dev \
            libtss2-dev \
            libssl-dev libsystemd-dev libseccomp-dev \
            libdbus-1-dev \
            libsdl2-dev libcurl4-openssl-dev

      - name: Install libbpf >= 1.0
        if: matrix.language == 'c-cpp'
        env:
          LIBBPF_VERSION: v1.4.6
        run: |
          set -eu
          sudo apt-get install -y --no-install-recommends git
          git clone --depth 1 --branch "$LIBBPF_VERSION" \
            https://github.com/libbpf/libbpf.git /tmp/libbpf
          make -C /tmp/libbpf/src -j"$(nproc)"
          sudo make -C /tmp/libbpf/src install \
            PREFIX=/usr LIBDIR=/usr/lib/x86_64-linux-gnu
          sudo ldconfig

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/verifier/go.mod
          cache-dependency-path: |
            src/verifier/go.sum
            src/attestca/go.sum
            src/sdk/server/go.sum
            examples/demo_server/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build C database
        if: matrix.language == 'c-cpp'
        run: |
          make BUILD_DIR=build-codeql-c \
            test-unit examples build-codeql-c/bench_sdk syzkaller-fuzz-loader

      - name: Build Go database
        if: matrix.language == 'go'
        run: |
          set -eu
          for mod in src/verifier src/attestca src/sdk/server examples/demo_server; do
            (cd "$mod" && go test ./...)
          done

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: src/verifier/go.sum

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Run actionlint
        run: |
          "$(go env GOPATH)/bin/actionlint" -color

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    permissions:
      actions: read # inspect workflow definitions being audited
      contents: read # check out the workflows to audit
      security-events: write # upload zizmor SARIF results to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          inputs: .
          persona: auditor
          version: v1.25.2

  gosec:
    name: gosec
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/verifier/go.mod
          cache-dependency-path: |
            src/verifier/go.sum
            src/attestca/go.sum
            src/sdk/server/go.sum
            examples/demo_server/go.sum

      - name: Install gosec
        env:
          GOTOOLCHAIN: auto
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1

      - name: Run gosec on every Go module
        # G104, G304 and G115 are excluded -- the same three classes
        # golangci-lint excludes by default.
        # G104 (unhandled errors) is already enforced by errcheck in golangci-lint;
        # G304 flags file opens from operator-supplied paths that are validated before use;
        # G115 flags integer conversions in the bounds-checked wire parsers.
        #
        # Enforcing them here would drown the crypto/TLS/rand signal
        # in noise without catching a real defect.
        #
        # go.work does not make gosec traverse the member modules, so each is
        # scanned in its own module context.
        run: |
          set -eu
          gosec="$(go env GOPATH)/bin/gosec"
          rc=0
          for mod in src/verifier src/attestca src/sdk/server examples/demo_server; do
            echo "::group::gosec $mod"
            (cd "$mod" && "$gosec" -exclude=G104,G304,G115 -severity=low ./...) || rc=1
            echo "::endgroup::"
          done
          exit "$rc"

  trivy:
    name: trivy-deps
    runs-on: ubuntu-24.04
    permissions:
      contents: read # read the dependency manifests being scanned
      security-events: write # upload Trivy SARIF results to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Report pass: every severity to code scanning, never fails the job, so
      # MEDIUM/LOW advisories are visible without blocking the build
      - name: Trivy dependency scan (SARIF report)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln
          format: sarif
          output: trivy-results.sarif
          severity: LOW,MEDIUM,HIGH,CRITICAL

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-deps

      # Gate pass: known HIGH or CRITICAL vulnerability in a Go
      # dependency fails the build
      - name: Trivy gate (HIGH, CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          check-latest: true
          cache-dependency-path: |
            src/verifier/go.sum
            src/attestca/go.sum
            src/sdk/server/go.sum
            examples/demo_server/go.sum

      - name: Install govulncheck
        env:
          GOTOOLCHAIN: auto
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck on every Go module
        # govulncheck is call-graph aware: unlike a manifest scanner it fails
        # only when the code actually reaches a vulnerable symbol, not merely
        # when a flagged module is required. It complements Trivy with far
        # fewer false positives from unreachable advisories.
        run: |
          set -eu
          govulncheck="$(go env GOPATH)/bin/govulncheck"
          rc=0
          for mod in src/verifier src/attestca src/sdk/server examples/demo_server; do
            echo "::group::govulncheck $mod"
            (cd "$mod" && "$govulncheck" ./...) || rc=1
            echo "::endgroup::"
          done
          exit "$rc"
