name: Security analysis

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  codeql:
    name: codeql-${{ matrix.language }}
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [c-cpp, go]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install C build dependencies
        if: matrix.language == 'c-cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang llvm pkg-config \
            libelf-dev zlib1g-dev \
            libtss2-dev \
            libssl-dev libsystemd-dev libseccomp-dev \
            libdbus-1-dev \
            libsdl2-dev libcurl4-openssl-dev

      - name: Install libbpf >= 1.0
        if: matrix.language == 'c-cpp'
        env:
          LIBBPF_VERSION: v1.4.6
        run: |
          set -eu
          sudo apt-get install -y --no-install-recommends git
          git clone --depth 1 --branch "$LIBBPF_VERSION" \
            https://github.com/libbpf/libbpf.git /tmp/libbpf
          make -C /tmp/libbpf/src -j"$(nproc)"
          sudo make -C /tmp/libbpf/src install \
            PREFIX=/usr LIBDIR=/usr/lib/x86_64-linux-gnu
          sudo ldconfig

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/verifier/go.mod
          cache-dependency-path: |
            src/verifier/go.sum
            src/attestca/go.sum
            src/sdk/server/go.sum
            examples/demo_server/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build C database
        if: matrix.language == 'c-cpp'
        run: |
          make BUILD_DIR=build-codeql-c \
            test-unit examples build-codeql-c/bench_sdk syzkaller-fuzz-loader

      - name: Build Go database
        if: matrix.language == 'go'
        run: |
          set -eu
          for mod in src/verifier src/attestca src/sdk/server examples/demo_server; do
            (cd "$mod" && go test ./...)
          done

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: src/verifier/go.sum

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Run actionlint
        run: |
          "$(go env GOPATH)/bin/actionlint" -color

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@v0.5.6
        with:
          inputs: .
          persona: auditor
          version: v1.25.2
