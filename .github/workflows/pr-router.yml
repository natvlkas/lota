name: PR router

# main is the default branch, so external contributors probably will open PRs
# against it. Development belongs on lota-next, so retarget any PR that an
# outside contributor opens against main and explain the branch model.
#
# pull_request_target runs with a token that can edit PRs (pull_request from a
# fork is read-only). It deliberately does NOT check out or run any PR code --
# it only calls the GitHub API -- so the elevated token is never exposed to
# untrusted code.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  retarget:
    name: redirect main PRs to lota-next
    runs-on: ubuntu-24.04
    # only act on PRs aimed at main, opened by someone other than the
    # maintainer, and not by a bot (dependabot et al. are left alone)
    if: >-
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.user.login != 'szymonwilczek' &&
      github.event.pull_request.user.type != 'Bot'
    steps:
      - name: Retarget to lota-next and explain
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          NUM: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -eu
          gh pr edit "$NUM" --repo "$REPO" --base lota-next
          cat > /tmp/pr-comment.md <<EOF
          Hi @$AUTHOR -- thanks for the contribution!

          \`main\` carries only stable, released code.
          All development lands on the **\`lota-next\`** integration branch first.
          I have automatically retargeted this PR to \`lota-next\`.
          If it now shows conflicts, please rebase your branch onto \`lota-next\`.

          See the branch model and release flow in \`docs/BRANCHING.md\`.
          EOF
          gh pr comment "$NUM" --repo "$REPO" --body-file /tmp/pr-comment.md
